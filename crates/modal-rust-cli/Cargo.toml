[package]
name = "modal-rust-cli"
version = "0.0.0"
edition = "2021"
description = "The `modal-rust` binary: a pure wrapper that generates the Modal Python shims and drives the official `modal` CLI. clap lives here (CLI-only), never in the runtime."
publish = false

[[bin]]
name = "modal-rust"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
serde_json = "1"
anyhow = "1"
