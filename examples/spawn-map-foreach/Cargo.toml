[package]
name = "example-spawn-map-foreach"
version = "0.0.0"
edition = "2021"
description = "Teaches ONE concept: the rest of the map family — fire-and-forget fan-out with .spawn_map() and side-effect maps with .for_each() — one #[modal_rust::function] fanned out over N inputs whose RESULTS you do not collect, via the string-keyed app.function(\"notify\") handle the macro registers."
publish = false

[lib]
name = "example_spawn_map_foreach"
path = "src/lib.rs"

[[bin]]
# The RUN/DEPLOY runner — its whole body is one line: `modal_rust::modal_runner!(..)`.
name = "modal_runner"
path = "src/bin/modal_runner.rs"

[[bin]]
# The driver tour: the offline local fan-out runs in `cargo run`; the live
# `.for_each([..])` (waits, discards) and `.spawn_map([..])` (fire-and-forget)
# shapes compile always, run only with credentials.
name = "spawn_map_foreach"
path = "src/bin/spawn_map_foreach.rs"

[dependencies]
# SINGLE modal dependency — exactly what a fresh external user writes. The
# `#[modal_rust::function]` macro routes its generated code through this facade, so
# there is no `modal-rust-runtime` / `inventory` to add and no rename.
modal-rust = { path = "../../crates/modal-rust" }
serde = { version = "1", features = ["derive"] }
anyhow = "1"
# `.for_each([..])` / `.spawn_map([..])` are async; the driver drives them with a
# tokio runtime.
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
