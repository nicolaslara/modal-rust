[package]
name = "example-ways-to-call"
version = "0.0.0"
edition = "2021"
description = "Teaches ONE concept: the four ways to invoke a single #[modal_rust::function] — .local(), .remote().await, .spawn()+.get(), and .map([..]) — through the typed app.square(n) method the macro generates."
publish = false

[lib]
name = "example_ways_to_call"
path = "src/lib.rs"

[[bin]]
# The RUN/DEPLOY runner — its whole body is one line: `modal_rust::modal_runner!(..)`.
name = "modal_runner"
path = "src/bin/modal_runner.rs"

[[bin]]
# The driver tour: the offline `.local()` call runs in `cargo run`; the three live
# shapes (.remote()/.spawn()/.map()) compile always, run only with credentials.
name = "ways_to_call"
path = "src/bin/ways_to_call.rs"

[dependencies]
# SINGLE modal dependency — exactly what a fresh external user writes. The
# `#[modal_rust::function]` macro routes its generated code through this facade, so
# there is no `modal-rust-runtime` / `inventory` to add and no rename.
modal-rust = { path = "../../crates/modal-rust" }
serde = { version = "1", features = ["derive"] }
anyhow = "1"
# The live shapes (.remote()/.spawn()/.map()) are async; the driver drives them
# with a tokio runtime.
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
